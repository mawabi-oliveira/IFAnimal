<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFAnimal - Adotar</title>
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/adotar.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img src="./img/inseridos/ifanimal-logo.jpg" alt="IFAnimal Logo">
        </div>

        <ul class="nav-links">
            <li><a href="./home.html">INÍCIO</a></li>
            <img src="./img/inseridos/pegada.png" alt="pegada" class="paw-icon">

            <li><a href="adotar.html" class="active">ADOTAR</a></li>
            <img src="./img/inseridos/pegada.png" alt="pegada" class="paw-icon">

            <li><a href="./sobre.html">SOBRE NÓS</a></li>
        </ul>
    </nav>

    <header class="cabecalho-adocao">
        <h1>Gatinhos para adoção: Encontre seu novo melhor amigo</h1>
    </header>

    <main class="fundo-verde">
        <section class="galeria-infinita">

            <div class="card">
                <img src="./img/gatos/cat-1.jpeg" alt="Luna">
                <div class="card-info">
                    <div class="nome-idade">
                        <h3>Luna</h3>
                        <span class="idade">1 ano</span>
                    </div>
                    <span class="origem">IFAnimal</span>
                </div>
                <form action="#" method="post" onsubmit="handleAdopt(event)">
                    <button class="adotar-btn" type="submit">QUERO ADOTAR</button>
                </form>
            </div>

            <div class="card">
                <img src="./img/gatos/cat-2.jpeg" alt="Fernando">
                <div class="card-info">
                    <div class="nome-idade">
                        <h3>Fernando</h3>
                        <span class="idade">3 anos</span>
                    </div>
                    <span class="origem">IFAnimal</span>
                </div>
                <form action="/adotar.html" method="get">
                    <button class="adotar-btn" type="submit">QUERO ADOTAR</button>
                </form>
            </div>

            <div class="card">
                <img src="./img/gatos/cat-3.jpeg" alt="Roberto">
                <div class="card-info">
                    <div class="nome-idade">
                        <h3>Roberto</h3>
                        <span class="idade">2 anos</span>
                    </div>
                    <span class="origem">IFAnimal</span>
                </div>
                <form action="/adotar.html" method="get">
                    <button class="adotar-btn" type="submit">QUERO ADOTAR</button>
                </form>
            </div>

            <div class="card">
                <img src="./img/gatos/cat-4.jpeg" alt="Thornado">
                <div class="card-info">
                    <div class="nome-idade">
                        <h3>Thornado</h3>
                        <span class="idade">4 anos</span>
                    </div>
                    <span class="origem">IFAnimal</span>
                </div>
                    <form action="/adotar.html" method="get">
                        <button class="adotar-btn" type="submit">QUERO ADOTAR</button>
                    </form>
                </div>
    
                <div class="card">
                    <img src="./img/gatos/cat-5.jpeg" alt="Tigrinho">
                    <div class="card-info">
                        <div class="nome-idade">
                            <h3>Tigrinho</h3>
                            <span class="idade">6 meses</span>
                        </div>
                        <span class="origem">IFAnimal</span>
                    </div>
                    <form action="/adotar.html" method="get">
                        <button class="adotar-btn" type="submit">QUERO ADOTAR</button>
                    </form>
                </div>
    
                <div class="card">
                    <img src="./img/gatos/cat-6.jpeg" alt="Baleia">
                    <div class="card-info">
                        <div class="nome-idade">
                            <h3>Baleia</h3>
                            <span class="idade">1 ano</span>
                        </div>
                        <span class="origem">IFAnimal</span>
                    </div>
                    <form action="/adotar.html" method="get">
                        <button class="adotar-btn" type="submit">QUERO ADOTAR</button>
                    </form>
                </div>

        </section>
    </main>

    <footer class="footer">
        <p>IFAnimal - Projeto Social. Maceió - AL, Brasil.</p>
    </footer>

<script>
function handleAdopt(event) {
    event.preventDefault();
    alert('Obrigado por seu interesse em adotar! Em breve entraremos em contato.');
}
</script>
</body>

</html>
